<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">
    <body class="auth-body">
    <ul class="floating-shapes">
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>
    <div class="auth-container" id="authContainer">
        <div class="form-container sign-up-container">
            <form id="registerForm">
                <h2>Create Account</h2>
                <br>
                <br>
                <input type="text" id="regUsername" placeholder="Name" required />
                <br>
                <input type="email" id="regEmail" placeholder="Email" required />
                <br>
                <input type="password" id="regPassword" placeholder="Password" required />
                <br>
                <select id="regRole" aria-label="Select Role" required>
    <option value="" disabled selected>Select Role</option>
    <option value="admin">Administrator</option>
    <option value="employee">Employee</option>
</select>
                <button type="submit" class="auth-btn">Sign Up</button>
            </form>
        </div>
        
        <div class="form-container sign-in-container">
            <form id="loginForm">
                <h2>Sign in</h2>
                <br>
                <br>
                <input type="text" id="loginUsername" placeholder="Username (e.g., shiv)" required />
                <br>
                <input type="password" id="loginPassword" placeholder="Password" required />
                <br>
            <select id="loginRole" aria-label="Select Role" required>
    <option value="admin">Administrator</option>
    <option value="employee">Employee</option>
</select>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
        </div>
        
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h2>Welcome Back!</h2>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="auth-btn ghost" id="signInBtn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h2>Hello, Friend!</h2>
                    <p>Enter your personal details and start your journey with us</p>
                    <button class="auth-btn ghost" id="signUpBtn">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
