<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin Portal</h2>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="#"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-users"></i> Employees</a></li>
                <li><a href="#"><i class="fas fa-tasks"></i> Tasks</a></li>
                <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h1 id="pageTitle">Dashboard</h1>
                <button id="openTaskModal" class="btn-primary" style="display: none;">+ Add New Task</button>
            </header>

            <section id="dashboardSection" class="content-section">
                <div class="welcome-banner">
                    <div class="banner-text">
                        <h2>Welcome back! 👋</h2>
                        <p>Here is what's happening with your team's projects today.</p>
                    </div>
                    <div class="banner-icon"><i class="fas fa-rocket"></i></div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #e0e7ff; color: #4f46e5;"><i class="fas fa-tasks"></i></div>
                        <div class="stat-details">
                            <h3>Total Tasks</h3>
                            <p id="statTotalTasks">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #dcfce7; color: #16a34a;"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-details">
                            <h3>Completed</h3>
                            <p id="statCompleted">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #fef08a; color: #ca8a04;"><i class="fas fa-clock"></i></div>
                        <div class="stat-details">
                            <h3>Pending</h3>
                            <p id="statPending">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #fae8ff; color: #c026d3;"><i class="fas fa-users"></i></div>
                        <div class="stat-details">
                            <h3>Team Size</h3>
                            <p id="statTeamSize">3</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="employeesSection" class="content-section hidden">
                <div class="employee-grid" id="employeeGrid">
                    </div>
            </section>

            <section id="tasksSection" class="content-section hidden">
                <div class="task-section">
                    <table class="task-table">
                        <thead>
                            <tr>
                                <th>Task Name</th>
                                <th>Assigned To</th>
                                <th>Priority</th>
                                <th>Deadline</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="taskList">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="taskModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Task</h2>
                <span class="close-modal">&times;</span>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label for="title">Task Title</label>
                    <input type="text" id="title" placeholder="e.g., Q3 Financial Report" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Task Description</label>
                    <textarea id="description" rows="3" placeholder="Provide task details..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="assignedTo">Assign Employee</label>
                        <select id="assignedTo"></select>
                    </div>
                    
                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" id="dueDate" required>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
